name: Update Financial Status (DART, monthly)

on:
  schedule:
    # 매월 1일 23:30 KST = 14:30 UTC (revenue 워크플로보다 30분 늦게 시작)
    - cron: '30 14 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-snapshot-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # GitHub free 한도 6시간 직전. 체크포인트로 다음 실행에 이어감.
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch listed_stocks.json from data-snapshot
        shell: bash
        run: |
          mkdir -p data
          git fetch origin data-snapshot 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/data-snapshot; then
            TMP=$(mktemp)
            if git show origin/data-snapshot:listed_stocks.json > "$TMP" 2>/dev/null && [ -s "$TMP" ]; then
              mv "$TMP" data/listed_stocks.json
              echo "  listed_stocks.json fetched ($(stat -c%s data/listed_stocks.json) bytes)"
            else
              rm -f "$TMP"
              echo "  listed_stocks.json: data-snapshot에 없음 (industry_mapping fallback)"
            fi
          fi
          ls -la data/

      # 이전 실행의 부분 결과(_financial_progress.json)를 캐시에서 복원.
      # restore-keys로 prefix 매칭 → 가장 최근 실행 캐시 자동 사용.
      - name: Restore financial progress cache
        id: restore-progress
        uses: actions/cache/restore@v4
        with:
          path: data/_financial_progress.json
          key: financial-progress-${{ github.run_id }}
          restore-keys: |
            financial-progress-

      - name: Run update_financial_status.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scripts/update_financial_status.py

      # 진행 파일이 있으면 캐시에 저장 (성공 시 스크립트가 삭제하므로 캐시 안 됨 → fresh next run)
      - name: Save financial progress cache
        if: always() && hashFiles('data/_financial_progress.json') != ''
        uses: actions/cache/save@v4
        with:
          path: data/_financial_progress.json
          key: financial-progress-${{ github.run_id }}

      - name: Push financial_status.json to data-snapshot branch
        shell: bash
        run: |
          set -e
          DATA_FILE="data/financial_status.json"
          OUTPUT_NAME="financial_status.json"

          if [ ! -f "$DATA_FILE" ]; then
            echo "financial_status.json이 생성되지 않음. push 건너뜀."
            exit 0
          fi
          cp "$DATA_FILE" "/tmp/$OUTPUT_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin data-snapshot 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/data-snapshot; then
            git checkout -B data-snapshot origin/data-snapshot
          else
            git checkout --orphan data-snapshot
            git rm -rf --cached . 2>/dev/null || true
          fi

          git clean -fdx

          cp "/tmp/$OUTPUT_NAME" "./$OUTPUT_NAME"

          git add "$OUTPUT_NAME"
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "data: update financial_status ($(date -u +%Y-%m-%dT%H:%M:%SZ)) [skip ci]"
            git push origin data-snapshot
          fi
