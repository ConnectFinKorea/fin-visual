<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinVisual</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Top Navigation -->
  <header class="topbar">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#3b82f6" stroke-width="1.5"/>
        <ellipse cx="12" cy="12" rx="4" ry="10" stroke="#3b82f6" stroke-width="1.5"/>
        <line x1="2" y1="12" x2="22" y2="12" stroke="#3b82f6" stroke-width="1.5"/>
        <path d="M4.5 7.5 Q12 10 19.5 7.5" stroke="#3b82f6" stroke-width="1.2" fill="none"/>
        <path d="M4.5 16.5 Q12 14 19.5 16.5" stroke="#3b82f6" stroke-width="1.2" fill="none"/>
      </svg>
      FinVisual
    </div>
    <nav class="top-nav">
      <a href="#" class="nav-item active" data-section="finance">재무현황</a>
      <a href="#" class="nav-item" data-section="chart">차트</a>
      <a href="#" class="nav-item" data-section="news">뉴스</a>
    </nav>
    <div class="topbar-right">
      <span class="date-label" id="date-label"></span>
    </div>
  </header>

  <div class="layout">

    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title">산업 분류</div>
      <ul class="industry-list" id="industry-list"></ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="placeholder">
        <div class="placeholder-icon">📊</div>
        <p class="placeholder-text">산업을 선택하면 데이터가 표시됩니다.</p>
      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
