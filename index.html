<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinVisual</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Top Navigation -->
  <header class="topbar">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1"    y="18" width="4" height="5"  fill="#800020" rx="0.5"/>
        <rect x="6.5"  y="14" width="4" height="9"  fill="#800020" rx="0.5"/>
        <rect x="12"   y="9"  width="4" height="14" fill="#800020" rx="0.5"/>
        <rect x="17.5" y="3"  width="4" height="20" fill="#800020" rx="0.5"/>
        <path d="M2 19 Q9 11 17 4" stroke="#800020" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <path d="M14 2 L18 3 L17 7" stroke="#800020" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      FinVisual
    </div>
    <nav class="top-nav">
      <a href="#" class="nav-item active" data-section="finance">재무현황</a>
      <a href="#" class="nav-item" data-section="chart">차트</a>
      <a href="#" class="nav-item" data-section="news">뉴스</a>
    </nav>
    <div class="topbar-right">
      <span class="date-label" id="date-label"></span>
    </div>
  </header>

  <div class="layout">

    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title" id="industry-toggle">
        <span>산업 분류</span>
        <svg class="toggle-arrow" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <ul class="industry-list" id="industry-list"></ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="placeholder">
        <div class="placeholder-icon">📊</div>
        <p class="placeholder-text">산업을 선택하면 데이터가 표시됩니다.</p>
      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
